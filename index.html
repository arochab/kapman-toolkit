<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kapman Toolkit</title>
  <meta name="description" content="Kapman Toolkit — production decision platform for Ableton sessions.">
  <link rel="icon" href="assets/kapman-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" class="sprite">
    <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5V21H14v-6H10v6H3V10.5Z" fill="currentColor"/></symbol>
    <symbol id="i-route" viewBox="0 0 24 24"><path d="M7 5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm10 9a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5ZM8.5 7.5h5.5a4 4 0 1 1 0 8H10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="i-recipe" viewBox="0 0 24 24"><path d="M6 4h12v4H6zM4 10h16v10H4z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 7h8M8 14h8M8 18h5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="i-library" viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M10 8h4M10 12h4M10 16h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="i-fix" viewBox="0 0 24 24"><path d="M14.5 5a4.5 4.5 0 0 0-4.3 5.8L4.2 16.7 7.3 19.8l5.9-6a4.5 4.5 0 1 0 1.3-8.8Z" fill="none" stroke="currentColor" stroke-width="2"/><path d="m15 8 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="i-mix" viewBox="0 0 24 24"><path d="M4 15V9m5 9V6m6 12V8m5 10V5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="4" cy="15" r="1.7" fill="currentColor"/><circle cx="9" cy="18" r="1.7" fill="currentColor"/><circle cx="15" cy="8" r="1.7" fill="currentColor"/><circle cx="20" cy="5" r="1.7" fill="currentColor"/></symbol>
    <symbol id="i-finish" viewBox="0 0 24 24"><path d="M6 4h12v16H6z" fill="none" stroke="currentColor" stroke-width="2"/><path d="m8 12 2.5 2.5L16 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-session" viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 8a7 7 0 0 1 14 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="2"/><path d="m20 20-4.2-4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="i-star" viewBox="0 0 24 24"><path d="m12 3 2.8 5.6 6.2.9-4.5 4.3 1.1 6.2L12 17.1 6.4 20l1.1-6.2L3 9.5l6.2-.9L12 3Z" fill="currentColor"/></symbol>
    <symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 12h14m0 0-5-5m5 5-5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-upload" viewBox="0 0 24 24"><path d="M12 17V6m0 0-4 4m4-4 4 4M5 20h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-wave" viewBox="0 0 24 24"><path d="M2 12h3l2.5-7 4 14 4-11 2 4h4.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="m5 12 4 4L19 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="i-note" viewBox="0 0 24 24"><path d="M6 4h12v16l-6-3-6 3V4Z" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
    <symbol id="i-grid" viewBox="0 0 24 24"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
    <symbol id="i-close" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
  </svg>

  <div class="backdrop"></div>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand-row">
        <img src="assets/kapman-mark.svg" class="brand-logo" alt="Kapman Toolkit">
        <div>
          <div class="brand-name">KAPMAN</div>
          <div class="brand-sub">Toolkit 2026</div>
        </div>
      </div>

      <div class="search-box">
        <svg class="icon"><use href="#i-search"></use></svg>
        <input id="searchInput" type="search" placeholder="Search plugin, route, issue…" aria-label="Search toolkit">
      </div>

      <nav class="side-nav" id="nav"></nav>

      <div class="side-section">
        <div class="side-label">Vendor dock</div>
        <div id="vendorDock" class="vendor-dock"></div>
      </div>

      <div class="side-footer">
        <button class="rail-toggle" id="railToggle">
          <svg class="icon"><use href="#i-grid"></use></svg>
          <span>Focus mode</span>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="mobileNav" class="icon-btn mobile-only" aria-label="Open navigation"><svg class="icon"><use href="#i-grid"></use></svg></button>
        <div>
          <div class="eyebrow" id="eyebrow">Dashboard</div>
          <h1 class="page-title" id="pageTitle">Kapman Toolkit</h1>
        </div>
        <div class="topbar-actions">
          <button id="favoritesBtn" class="ghost-btn"><svg class="icon"><use href="#i-star"></use></svg><span>Favorites</span></button>
          <button id="mixBtn" class="primary-btn"><svg class="icon"><use href="#i-mix"></use></svg><span>Mix Check</span></button>
        </div>
      </header>

      <section id="mainStage" class="stage"></section>
    </main>

    <aside class="inspector" id="inspector">
      <div class="inspector-head">
        <div>
          <div class="inspector-kicker" id="inspectorKicker">Select an item</div>
          <div class="inspector-title" id="inspectorTitle">Inspector</div>
        </div>
        <button id="closeInspector" class="icon-btn" aria-label="Close details"><svg class="icon"><use href="#i-close"></use></svg></button>
      </div>
      <div id="inspectorBody" class="inspector-body"></div>
    </aside>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
