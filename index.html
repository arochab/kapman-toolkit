<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KAPMAN · Production Toolkit V3</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg0:#0e0f11;--bg1:#141519;--bg2:#1a1b21;--bg3:#22242b;--bg4:#2d3039;--bg5:#3b3e4a;
--tx0:#f2f3f7;--tx1:#c5c9d4;--tx2:#8a8f9e;--tx3:#5d6272;
--blue:#3b82f6;--blueD:rgba(59,130,246,.1);--blueG:rgba(59,130,246,.25);
--cyan:#22d3ee;--cyanD:rgba(34,211,238,.1);
--amber:#f59e0b;--amberD:rgba(245,158,11,.1);
--red:#ef4444;--redD:rgba(239,68,68,.08);
--green:#22c55e;--greenD:rgba(34,197,94,.1);
--purple:#a78bfa;--purpleD:rgba(167,139,250,.1);
--pink:#ec4899;--pinkD:rgba(236,72,153,.1);
--orange:#f97316;--orangeD:rgba(249,115,22,.1);
--r:8px;--rl:12px;--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
--side:260px;--head:48px;
}
html{font-size:13.5px;scroll-behavior:smooth;background:var(--bg0)}
body{font-family:var(--font);color:var(--tx0);line-height:1.55;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
::selection{background:var(--blue);color:#fff}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:4px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.side{width:var(--side);background:var(--bg1);border-right:1px solid var(--bg3);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50;transition:transform .2s ease}
.main{margin-left:var(--side);flex:1;min-height:100vh}
.head{position:sticky;top:0;z-index:40;background:rgba(14,15,17,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--bg3);padding:0 28px;height:var(--head);display:flex;align-items:center;gap:12px}
.head-title{font-size:15px;font-weight:700;white-space:nowrap}
.head-sub{font-size:11px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.content{padding:20px 28px 60px}

/* SIDEBAR */
.side-logo{padding:16px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:10px}
.logo-k{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:15px;color:#fff;flex-shrink:0}
.logo-t{font-weight:700;font-size:14px;letter-spacing:1.5px;text-transform:uppercase}
.logo-s{font-size:10px;color:var(--tx2);font-weight:400;margin-top:1px}
.side-search{padding:10px 12px 6px}
.sbox{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);cursor:pointer;transition:border-color .12s}
.sbox:hover{border-color:var(--bg5)}
.sbox svg{color:var(--tx3);width:13px;height:13px;flex-shrink:0}
.sbox span{color:var(--tx3);font-size:11px;flex:1}
.sbox kbd{font-family:var(--mono);font-size:9px;padding:1px 4px;background:var(--bg0);border:1px solid var(--bg3);border-radius:3px;color:var(--tx3)}
.side-nav{flex:1;padding:6px 8px;overflow-y:auto}
.nlbl{padding:6px 8px 3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tx3)}
.ni{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--tx2);transition:all .1s;border:1px solid transparent;margin-bottom:1px}
.ni:hover{background:var(--bg2);color:var(--tx1)}
.ni.on{background:var(--blueD);color:var(--blue);border-color:rgba(59,130,246,.12)}
.ni svg{width:14px;height:14px;flex-shrink:0;opacity:.6}
.ni.on svg{opacity:1}
.ni .cnt{margin-left:auto;font-size:9px;font-family:var(--mono);background:var(--bg3);padding:1px 5px;border-radius:8px;color:var(--tx3)}
.ni.on .cnt{background:var(--blueD);color:var(--blue)}
.side-ft{padding:10px 12px;border-top:1px solid var(--bg3)}
.msw{display:flex;background:var(--bg2);border-radius:6px;padding:2px;border:1px solid var(--bg3)}
.mbtn{flex:1;padding:5px;font-size:10px;font-weight:600;text-align:center;border:none;background:none;color:var(--tx3);cursor:pointer;border-radius:5px;font-family:var(--font);transition:all .1s}
.mbtn.on{background:var(--blue);color:#fff}

/* FILTERS */
.frow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;align-items:center}
.fp{padding:4px 10px;font-size:10.5px;font-weight:500;color:var(--tx2);background:var(--bg2);border:1px solid var(--bg3);border-radius:16px;cursor:pointer;transition:all .1s;white-space:nowrap;font-family:var(--font)}
.fp:hover{color:var(--tx1);border-color:var(--bg5)}
.fp.on{color:var(--blue);background:var(--blueD);border-color:rgba(59,130,246,.15)}
.fp-mood.on{color:var(--amber);background:var(--amberD);border-color:rgba(245,158,11,.15)}
.fsep{width:1px;height:18px;background:var(--bg4);margin:0 3px}

/* GRID & CARDS */
.gr{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:10px}
.cd{background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--rl);overflow:hidden;transition:all .15s}
.cd:hover{border-color:var(--bg5);box-shadow:0 4px 20px rgba(0,0,0,.18)}
.cd.core{border-left:2px solid var(--blue)}
.cd-top{display:flex;align-items:center;gap:9px;padding:12px 14px 0}
.vi{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;font-weight:700;flex-shrink:0;letter-spacing:.3px}
.cd-m{flex:1;min-width:0}
.cd-ir{display:flex;align-items:center;gap:5px}
.cid{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--tx3);background:var(--bg3);padding:0 5px;border-radius:3px;line-height:1.6}
.cd-n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cd-b{display:flex;gap:2px}
.cb{width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:none;border:none;border-radius:5px;color:var(--tx3);cursor:pointer;font-size:12px;transition:all .08s}
.cb:hover{background:var(--bg3);color:var(--tx1)}
.cb.fo{color:var(--amber)}

/* Tags */
.cd-t{display:flex;flex-wrap:wrap;gap:3px;padding:6px 14px 0}
.tg{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;letter-spacing:.3px;text-transform:uppercase;font-family:var(--mono);line-height:1.6}
.tg-g{background:var(--cyanD);color:var(--cyan)} /* genre */
.tg-m{background:var(--amberD);color:var(--amber)} /* mood */
.tg-t{background:var(--greenD);color:var(--green)} /* type */
.tg-r{background:var(--purpleD);color:var(--purple)} /* role */
.tg-i{background:var(--blueD);color:var(--blue)} /* insert */
.tg-re{background:var(--pinkD);color:var(--pink)} /* return */

.cd-d{padding:6px 14px;font-size:11.5px;color:var(--tx2);line-height:1.45}

/* Dose */
.dose{display:flex;align-items:center;gap:6px;padding:3px 14px 0}
.dose-t{flex:1;height:2px;background:var(--bg3);border-radius:1px;overflow:hidden}
.dose-f{height:100%;border-radius:1px}
.d-micro{width:18%;background:var(--green)}.d-low{width:33%;background:var(--cyan)}.d-med{width:52%;background:var(--amber)}.d-moment{width:78%;background:var(--red)}
.dose-l{font-size:9px;font-family:var(--mono);color:var(--tx3);white-space:nowrap}

/* Expand */
.cd-exp{overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.cd.open .cd-exp{max-height:3000px}
.cd-tog{display:flex;align-items:center;justify-content:center;gap:3px;padding:6px 14px;font-size:10px;font-weight:500;color:var(--tx3);cursor:pointer;transition:color .1s;border-top:1px solid var(--bg3);margin-top:8px}
.cd-tog:hover{color:var(--tx1)}
.cd-tog svg{width:12px;height:12px;transition:transform .2s}
.cd.open .cd-tog svg{transform:rotate(180deg)}

.cd-body{padding:0 14px 14px}
.dt{margin-top:8px}
.dt-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-bottom:3px;display:flex;align-items:center;gap:5px}
.dt-l::after{content:'';flex:1;height:1px;background:var(--bg3)}
.dt-v{font-family:var(--mono);font-size:11px;color:var(--tx1);line-height:1.65;padding:8px 10px;background:var(--bg0);border-radius:var(--r);border:1px solid var(--bg3);white-space:pre-wrap;word-break:break-word}
.dt-v em{color:var(--blue);font-style:normal}

/* Chain steps */
.cs{display:flex;gap:8px;padding:8px 10px;background:var(--bg0);border:1px solid var(--bg3);border-radius:var(--r);margin-top:5px}
.cs-n{width:20px;height:20px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:50%;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--tx2);flex-shrink:0;margin-top:1px}
.cs-i{flex:1;min-width:0}
.cs-p{font-size:11px;font-weight:600;color:var(--tx0)}
.cs-r{font-size:9px;color:var(--cyan);font-weight:500;margin-left:5px}
.cs-s{font-family:var(--mono);font-size:10.5px;color:var(--tx2);line-height:1.55;margin-top:1px}

/* Stop rules */
.sr{margin-top:10px;padding:8px 10px;background:var(--redD);border:1px solid rgba(239,68,68,.12);border-radius:var(--r)}
.sr-t{font-size:9px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.sr-r{font-size:10.5px;color:var(--tx2);line-height:1.45;padding:1px 0 1px 12px;position:relative}
.sr-r::before{content:'×';position:absolute;left:0;color:var(--red);font-weight:700;font-size:11px}

/* Copy */
.cpb{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;font-size:9.5px;font-weight:600;background:var(--bg3);border:1px solid var(--bg4);border-radius:4px;color:var(--tx2);cursor:pointer;font-family:var(--mono);transition:all .1s;letter-spacing:.2px}
.cpb:hover{border-color:var(--blue);color:var(--blue)}
.cpb.ok{background:var(--green);color:#fff;border-color:var(--green)}

/* BUILDER */
.bw{display:grid;grid-template-columns:260px 1fr;gap:20px}
.bp{background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--rl);padding:16px;position:sticky;top:calc(var(--head) + 20px);align-self:start}
.fi{margin-bottom:12px}
.fl{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-bottom:4px}
.fin,.fsl{width:100%;padding:8px 10px;background:var(--bg0);border:1px solid var(--bg3);border-radius:var(--r);color:var(--tx0);font-family:var(--font);font-size:12px;transition:border-color .1s}
.fin:focus,.fsl:focus{border-color:var(--blue);outline:none}
.fsl option{background:var(--bg1)}
.gbtn{width:100%;padding:10px;font-size:12px;font-weight:700;background:var(--blue);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--font);transition:all .1s;letter-spacing:.4px}
.gbtn:hover{filter:brightness(1.1)}
.bout{min-height:300px}
.bb{background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px}
.bn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:var(--blue);border-radius:50%;font-size:10px;font-weight:700;font-family:var(--mono);color:#fff;flex-shrink:0}
.bh{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.bt{font-size:14px;font-weight:700}
.bs{font-size:11px;color:var(--tx2);margin-bottom:10px}

/* WIZARD */
.wc{margin-bottom:20px}
.wct{font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.wct::after{content:'';flex:1;height:1px;background:var(--bg3)}
.ws{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);margin-bottom:4px;transition:all .12s}
.ws.dn{opacity:.4}
.wch{width:18px;height:18px;border:2px solid var(--bg5);border-radius:50%;background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent;font-size:9px;transition:all .1s}
.wch.ok{background:var(--green);border-color:var(--green);color:#fff}

/* FIX-IT */
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.fc{padding:12px;background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);cursor:default;transition:all .12s}
.fc:hover{border-color:var(--cyan);background:var(--bg2)}
.fs{font-size:12px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.fs::before{content:'';width:5px;height:5px;background:var(--red);border-radius:50%;flex-shrink:0}
.ff{font-size:10.5px;color:var(--tx2);font-family:var(--mono);line-height:1.45}

/* MIXDOWN */
.mx-step{display:flex;gap:12px;margin-bottom:12px;padding:14px;background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--rl)}
.mx-n{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:50%;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--tx2);flex-shrink:0}
.mx-c{flex:1}
.mx-t{font-size:13px;font-weight:700;margin-bottom:2px}
.mx-d{font-size:11px;color:var(--tx2);line-height:1.5}
.mx-v{font-family:var(--mono);font-size:10.5px;color:var(--tx1);background:var(--bg0);padding:8px;border-radius:var(--r);border:1px solid var(--bg3);margin-top:6px;white-space:pre-wrap}

/* ARRANGEMENT */
.arr-row{display:flex;gap:2px;margin-bottom:2px}
.arr-cell{flex:1;padding:6px 4px;font-size:9px;font-family:var(--mono);text-align:center;border-radius:3px;font-weight:500}
.arr-head{background:var(--bg3);color:var(--tx2)}
.arr-on{background:var(--blueD);color:var(--blue);border:1px solid rgba(59,130,246,.15)}
.arr-off{background:var(--bg2);color:var(--tx3);border:1px solid transparent}
.arr-build{background:var(--amberD);color:var(--amber);border:1px solid rgba(245,158,11,.15)}
.arr-fx{background:var(--purpleD);color:var(--purple);border:1px solid rgba(167,139,250,.15)}

/* COMMAND */
.cmd-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:10vh;backdrop-filter:blur(3px)}
.cmd-bg.open{display:flex}
.cmd-box{width:min(520px,94vw);background:var(--bg1);border:1px solid var(--bg4);border-radius:var(--rl);overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.45)}
.cmd-h{display:flex;align-items:center;padding:0 12px;border-bottom:1px solid var(--bg3)}
.cmd-h svg{color:var(--tx3);width:14px;height:14px;flex-shrink:0}
.cmd-i{flex:1;padding:12px 8px;background:none;border:none;color:var(--tx0);font-size:14px;font-family:var(--font);outline:none}
.cmd-i::placeholder{color:var(--tx3)}
.cmd-l{max-height:300px;overflow-y:auto;padding:4px}
.cmd-r{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .06s}
.cmd-r:hover,.cmd-r.sel{background:var(--bg3)}
.cmd-ic{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:var(--bg0);border-radius:5px;font-size:8px;font-family:var(--mono);font-weight:700;color:var(--tx2);flex-shrink:0}
.cmd-tx{flex:1;min-width:0}
.cmd-nm{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmd-mt{font-size:9px;color:var(--tx3);font-family:var(--mono)}
.cmd-e{padding:24px;text-align:center;color:var(--tx3);font-size:12px}
.cmd-ft{padding:6px 12px;border-top:1px solid var(--bg3);display:flex;gap:12px;font-size:9px;color:var(--tx3)}
.cmd-ft kbd{font-family:var(--mono);padding:0 3px;background:var(--bg0);border:1px solid var(--bg3);border-radius:2px;font-size:8px}

/* VENDOR COLORS */
.v-ff{background:#1a2e4a;color:#5b9ef6}.v-d16{background:#3a1a1a;color:#e6705a}.v-uhe{background:#271e3a;color:#b090e6}
.v-art{background:#1a2a3a;color:#5abee6}.v-val{background:#1a3027;color:#60d090}.v-evt{background:#3a2a1a;color:#e6b050}
.v-ba{background:#3a1a2a;color:#e65a9a}.v-izo{background:#1a3a2a;color:#5ae6a0}.v-krg{background:#2a2a1a;color:#c0bc50}
.v-xfr{background:#2a1a3a;color:#c050e6}.v-abl{background:#222;color:#999}.v-cg{background:#1a253a;color:#5090e6}
.v-spc{background:#1a3a3a;color:#50e6e6}.v-dm{background:#3a1a1a;color:#e65050}.v-str{background:#2a2a1a;color:#b0b050}
.v-pls{background:#1a1a3a;color:#7070e6}.v-mix{background:#252530;color:#8888bb}

/* EMPTY */
.emp{text-align:center;padding:48px 20px;color:var(--tx3)}
.emp-i{font-size:24px;margin-bottom:6px}
.emp-t{font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:3px}

/* SECTION */
.sec{display:none}.sec.on{display:block}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);padding:7px 16px;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--r);color:var(--tx0);font-size:11px;font-weight:500;z-index:300;opacity:0;transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* RESPONSIVE */
@media(max-width:860px){.side{transform:translateX(-100%)}.side.mo{transform:translateX(0)}.main{margin-left:0}.content{padding:14px}.gr{grid-template-columns:1fr}.bw{grid-template-columns:1fr}.mob{display:flex!important}.head{padding:0 14px}}
.mob{display:none;align-items:center;justify-content:center;width:28px;height:28px;background:none;border:1px solid var(--bg4);border-radius:6px;color:var(--tx2);cursor:pointer}
.moo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:49;display:none}.moo.on{display:block}
</style>
</head>
<body>
<!-- PASSWORD GATE -->
<div id="lockScreen" style="position:fixed;inset:0;z-index:10000;background:#0e0f11;display:flex;align-items:center;justify-content:center">
<div style="text-align:center;max-width:320px;padding:24px">
<div style="width:56px;height:56px;background:#3b82f6;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;color:#fff">K</div>
<div style="font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:#f2f3f7;margin-bottom:4px">KAPMAN Toolkit</div>
<div style="font-size:12px;color:#8a8f9e;margin-bottom:20px">Accès réservé</div>
<input id="pwdIn" type="password" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')checkPwd()" style="width:100%;padding:10px 14px;background:#1a1b21;border:1px solid #22242b;border-radius:8px;color:#f2f3f7;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:8px;text-align:center">
<button onclick="checkPwd()" style="width:100%;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer">Entrer</button>

// ═══ CHANGE TON MOT DE PASSE ICI ═══
const KAPMAN_PWD = '62!NjC3e';
// ════════════════════════════════════

function checkPwd(){
  const v=document.getElementById('pwdIn').value;
  if(v===KAPMAN_PWD){
    document.getElementById('lockScreen').style.display='none';
    sessionStorage.setItem('kauth','1');
  } else {
    document.getElementById('pwdErr').style.display='block';
    document.getElementById('pwdIn').value='';
    document.getElementById('pwdIn').style.borderColor='#ef4444';
    setTimeout(()=>{document.getElementById('pwdIn').style.borderColor='#22242b';},800);
  }
}
if(sessionStorage.getItem('kauth')==='1') document.getElementById('lockScreen').style.display='none';

{id:'fixit',l:'Fix-It',ic:'<circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>',cnt:()=>X.length,t:'Fix-It',s:'Symptôme → Solution instantanée avec liens vers les racks'}
];
function rNav(){document.getElementById('sNav').innerHTML=`<div class="nlbl">Bibliothèque</div>${PG.slice(0,2).map(p=>`<div class="ni ${pg===p.id?'on':''}" onclick="go('${p.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${p.ic}</svg>${p.l}${p.cnt?`<span class="cnt">${p.cnt()}</span>`:''}</div>`).join('')}<div class="nlbl" style="margin-top:6px">Production</div>${PG.slice(2,4).map(p=>`<div class="ni ${pg===p.id?'on':''}" onclick="go('${p.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${p.ic}</svg>${p.l}</div>`).join('')}<div class="nlbl" style="margin-top:6px">Setup</div>${PG.slice(4).map(p=>`<div class="ni ${pg===p.id?'on':''}" onclick="go('${p.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${p.ic}</svg>${p.l}</div>`).join('')}`}
function go(p){pg=p;closeMob();render()}
function render(){rNav();const p=PG.find(x=>x.id===pg);document.getElementById('hT').textContent=p.t;document.getElementById('hS').textContent=p.s;const c=document.getElementById('ctn');
switch(pg){case'instr':c.innerHTML=rIP();break;case'fx':c.innerHTML=rFP();break;case'builder':c.innerHTML=rBP();break;case'mixdown':c.innerHTML=rMXP();break;case'wizard':c.innerHTML=rWP();break;case'fixit':c.innerHTML=rXP();break}}
function gM(m){gMd=m;document.getElementById('mAll').classList.toggle('on',m==='full');document.getElementById('mCore').classList.toggle('on',m==='core');render()}

// ════════════════════════════════════════════════════════
// FILTERS
// ════════════════════════════════════════════════════════
function fI(){return I.filter(i=>{if(gMd==='core'&&!i.core&&!fav[i.id])return false;if(iF.type&&i.type!==iF.type)return false;if(iF.vst&&i.vst!==iF.vst)return false;if(iF.genre&&!i.g.includes(iF.genre))return false;if(iF.mood&&!i.m.includes(iF.mood))return false;return true})}
function fF2(){return F.filter(f=>{if(gMd==='core'&&!f.core&&!fav[f.id])return false;if(fF.role&&f.role!==fF.role)return false;if(fF.v&&f.v!==fF.v)return false;if(fF.type&&f.type!==fF.type)return false;return true})}
function sIF(k,v){iF[k]=iF[k]===v?'':v;render()}
function sFF(k,v){fF[k]=fF[k]===v?'':v;render()}

// ════════════════════════════════════════════════════════
// RENDER: INSTRUMENTS
// ════════════════════════════════════════════════════════
function rIP(){const ts=[...new Set(I.map(i=>i.type))],vs=[...new Set(I.map(i=>i.vst))],gs=[...new Set(I.flatMap(i=>i.g))],ms=[...new Set(I.flatMap(i=>i.m))],items=fI();
return`<div class="frow">${ts.map(t=>`<button class="fp ${iF.type===t?'on':''}" onclick="sIF('type','${t}')">${t}</button>`).join('')}<div class="fsep"></div>${gs.map(g=>`<button class="fp ${iF.genre===g?'on':''}" onclick="sIF('genre','${g}')">${g}</button>`).join('')}<div class="fsep"></div>${ms.map(m=>`<button class="fp fp-mood ${iF.mood===m?'on':''}" onclick="sIF('mood','${m}')">${m}</button>`).join('')}</div>${items.length?`<div class="gr">${items.map(iC).join('')}</div>`:`<div class="emp"><div class="emp-i">∅</div><div class="emp-t">Aucun résultat</div></div>`}`}

function iC(i){const vc=VC[i.v]||'v-abl',vs2=VS[i.v]||i.v.slice(0,3);
return`<div class="cd ${i.core?'core':''}" id="c-${i.id}"><div class="cd-top"><div class="vi ${vc}">${vs2}</div><div class="cd-m"><div class="cd-ir"><span class="cid">${i.id}</span><span style="color:var(--tx3);font-size:10px">${i.vst}</span></div><div class="cd-n">${i.name}</div></div><div class="cd-b"><button class="cb ${fav[i.id]?'fo':''}" onclick="event.stopPropagation();tF('${i.id}')" title="Favori">★</button><button class="cb" onclick="event.stopPropagation();cR('${i.id}')" title="Copy">⎘</button></div></div><div class="cd-t"><span class="tg tg-t">${i.type}</span>${i.g.map(g=>`<span class="tg tg-g">${g}</span>`).join('')}${i.m.map(m=>`<span class="tg tg-m">${m}</span>`).join('')}</div><div class="cd-d">${i.desc}</div><div class="cd-tog" onclick="this.parentElement.classList.toggle('open')">Détails complets<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg></div><div class="cd-exp"><div class="cd-body"><div class="dt"><div class="dt-l">Preset / Init</div><div class="dt-v">${i.preset}</div></div><div class="dt"><div class="dt-l">Tweaks essentiels</div><div class="dt-v">${i.tweaks}</div></div><div class="dt"><div class="dt-l">Chaîne FX</div><div class="dt-v">${i.chain}</div></div><div class="sr"><div class="sr-t">Stop Rules</div>${i.stops.map(r=>`<div class="sr-r">${r}</div>`).join('')}</div><div style="margin-top:8px"><button class="cpb" onclick="cR('${i.id}')">Copier recette</button></div></div></div></div>`}

// ════════════════════════════════════════════════════════
// RENDER: FX
// ════════════════════════════════════════════════════════
function rFP(){const rs=[...new Set(F.map(f=>f.role))],items=fF2();
return`<div class="frow">${rs.map(r=>`<button class="fp ${fF.role===r?'on':''}" onclick="sFF('role','${r}')">${r}</button>`).join('')}<div class="fsep"></div><button class="fp ${fF.type==='Atomic'?'on':''}" onclick="sFF('type','Atomic')">Atomic</button><button class="fp ${fF.type==='Chain'?'on':''}" onclick="sFF('type','Chain')">Chain</button></div>${items.length?`<div class="gr">${items.map(fC).join('')}</div>`:`<div class="emp"><div class="emp-i">∅</div><div class="emp-t">Aucun résultat</div></div>`}`}

function dI(d){return{micro:['d-micro','Micro'],low:['d-low','Low'],medium:['d-med','Medium'],moment:['d-moment','Moment']}[d]||['d-low','?']}
function fC(f){const vc=VC[f.v]||'v-abl',vs2=VS[f.v]||f.v.slice(0,3),[dc,dl]=dI(f.dose);
return`<div class="cd ${f.core?'core':''}" id="c-${f.id}"><div class="cd-top"><div class="vi ${vc}">${vs2}</div><div class="cd-m"><div class="cd-ir"><span class="cid">${f.id}</span><span style="color:var(--tx3);font-size:10px">${f.v}</span></div><div class="cd-n">${f.name}</div></div><div class="cd-b"><button class="cb ${fav[f.id]?'fo':''}" onclick="event.stopPropagation();tF('${f.id}')">★</button><button class="cb" onclick="event.stopPropagation();cR('${f.id}')">⎘</button></div></div><div class="cd-t"><span class="tg tg-r">${f.role}</span><span class="tg tg-t">${f.type}</span><span class="tg ${f.ins?'tg-i':'tg-re'}">${f.ins?'INSERT':'RETURN'}</span></div><div class="cd-d">${f.desc}</div><div class="dose"><div class="dose-t"><div class="dose-f ${dc}"></div></div><div class="dose-l">${dl}</div></div><div class="cd-tog" onclick="this.parentElement.classList.toggle('open')">Chaîne complète<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg></div><div class="cd-exp"><div class="cd-body">${f.ch.map((c,j)=>`<div class="cs"><div class="cs-n">${j+1}</div><div class="cs-i"><div><span class="cs-p">${c.p}</span><span class="cs-r">${c.r}</span></div><div class="cs-s">${c.s}</div></div></div>`).join('')}<div class="sr"><div class="sr-t">Stop Rules</div>${f.stops.map(r=>`<div class="sr-r">${r}</div>`).join('')}</div><div style="margin-top:8px"><button class="cpb" onclick="cR('${f.id}')">Copier recette</button></div></div></div></div>`}

// ════════════════════════════════════════════════════════
// BUILDER
// ════════════════════════════════════════════════════════
function rBP(){return`<div class="bw"><div class="bp"><div class="fi"><label class="fl">BPM</label><input class="fin" id="xB" type="number" value="128" min="100" max="160"></div><div class="fi"><label class="fl">Tonalité</label><select class="fsl" id="xK"><option>Dm</option><option>Am</option><option>Gm</option><option>Cm</option><option>Em</option><option>Fm</option><option>Bbm</option></select></div><div class="fi"><label class="fl">Genre</label><select class="fsl" id="xG"><option value="Electro">Electro</option><option value="House">House</option><option value="Synthwave">Synthwave</option><option value="Minimale">Minimale</option><option value="Trance">Trance</option><option value="Pop">Pop</option></select></div><div class="fi"><label class="fl">Mood</label><select class="fsl" id="xM"><option value="Dark">Dark</option><option value="Warm">Warm</option><option value="Cold">Cold</option><option value="Bright">Bright</option><option value="Melancholic">Melancholic</option><option value="Euphoric">Euphoric</option></select></div><div class="fi"><label class="fl">Énergie</label><select class="fsl" id="xE"><option value="mid">Mid — groovy</option><option value="high">High — peak time</option><option value="low">Low — deep</option></select></div><button class="gbtn" onclick="genBP()">⚡ Générer Blueprint</button></div><div class="bout" id="bO"><div class="emp" style="padding-top:80px"><div class="emp-i">⚡</div><div class="emp-t">Configure et lance le builder</div></div></div></div>`}

function genBP(){const bpm=document.getElementById('xB').value,key=document.getElementById('xK').value,genre=document.getElementById('xG').value,mood=document.getElementById('xM').value,nrg=document.getElementById('xE').value;
function pk(t,g,m){const r=I.filter(i=>i.type===t&&(i.g.includes(g)||i.m.includes(m)));return r[0]||I.find(i=>i.type===t)}
const kick=I.find(i=>i.id==='I20'),bass=pk('Bass',genre,mood),lead=pk('Lead',genre,mood),pad=pk('Pad',genre,mood),arp=pk('Arp',genre,mood),drums=I.find(i=>i.id==='I21');
const el=[
{n:1,t:'Kick',s:'Le socle. Tuné, propre, punchy.',i:kick,fx:['F01','F03'],tw:[`Tune kick fondamentale sur ${key}`,`Sidechain bass → 4-6dB duck`,`HP 25Hz strict`]},
{n:2,t:'Bass Line',s:'Groove et fondation harmonique.',i:bass,fx:['F02'],tw:[`Tonalité ${key}, octave -1/-2`,`Filter cutoff: ${nrg==='high'?'plus ouvert 50%+':'fermé 30-40%'}`,`Sidechain kick OBLIGATOIRE`]},
{n:3,t:'Drums',s:'Snare, hats, percs. Le groove.',i:drums,fx:['F07','F08','F09'],tw:[`Snare 2&4${nrg==='high'?', ghost notes 1e-ah':''}`,`HH 1/16 velocity 80-110`,`Bus drums -3dB GR max`]},
{n:4,t:'Lead / Hook',s:'L\'élément mémorisable.',i:lead,fx:['F14'],tw:[`Mélodies dans ${key}, phrases 2-4 bars`,`MicroPitch ±8ct pour width`,`${mood==='Dark'?'Range basse, minimal':'Mid range, mémorisable'}`]},
{n:5,t:'Pad / Atmosphere',s:'Le lit sonore. Texture, pas attention.',i:pad,fx:['F17','F18'],tw:[`HP au-dessus du kick +1 oct`,`Room send -18dB`,`${mood==='Dark'?'Minimal, sombre':'Mouvement lent, chaud'}`]}];
if(arp)el.push({n:6,t:'Arp / Groove',s:'Mouvement mélodique secondaire.',i:arp,fx:['F20'],tw:[`1/16 synced ${bpm} BPM`,`Throw delay pour transitions`,`Volume SOUS le lead`]});
document.getElementById('bO').innerHTML=`<div style="margin-bottom:14px"><div style="font-size:15px;font-weight:700">${genre} · ${mood} — ${bpm} BPM — ${key}</div><div style="color:var(--tx2);font-size:11px;margin-top:2px">Blueprint Kapman · Énergie ${nrg}</div></div>${el.map(e=>`<div class="bb"><div class="bh"><div class="bn">${e.n}</div><div class="bt">${e.t}</div></div><div class="bs">${e.s}</div>${e.i?`<div style="padding:10px;background:var(--bg0);border:1px solid var(--bg3);border-radius:var(--r)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-weight:600;font-size:12px">${e.i.name}</span><span style="font-family:var(--mono);font-size:9px;color:var(--tx3)">${e.i.id} · ${e.i.vst}</span></div><div style="font-family:var(--mono);font-size:10.5px;color:var(--tx2);line-height:1.6">${e.tw.join('\n')}</div><div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:6px"><button class="cpb" onclick="cR('${e.i.id}')">Copy ${e.i.id}</button>${e.fx.map(f=>`<button class="cpb" onclick="cR('${f}')">Copy ${f}</button>`).join('')}<button class="cpb" onclick="jT('${e.i.id}')">→ ${e.i.id}</button></div></div>`:''}</div>`).join('')}<div class="bb" style="background:var(--amberD);border-color:rgba(245,158,11,.15)"><div style="font-weight:700;color:var(--amber);margin-bottom:5px">⚡ Rappels Kapman</div><div style="font-family:var(--mono);font-size:10.5px;color:var(--tx2);line-height:1.65">Level-match TOUJOURS\nGain staging -12dBFS par piste\nLess is more — si ça n'a pas sa place, COUPE\nSub mono <120Hz · HP tout sauf bass\nReturns sidechain au kick\nTarget: -14 LUFS streaming / -8 LUFS club\nFreeze les pistes finalisées pour CPU</div></div>`}

// ════════════════════════════════════════════════════════
// MIXDOWN
// ════════════════════════════════════════════════════════
function rMXP(){return MX.map((s,i)=>`<div class="mx-step"><div class="mx-n">${i+1}</div><div class="mx-c"><div class="mx-t">${s.t}</div><div class="mx-d">${s.d}</div><div class="mx-v">${s.v}</div></div></div>`).join('')}

// ════════════════════════════════════════════════════════
// WIZARD
// ════════════════════════════════════════════════════════
function rWP(){return W.map((c,ci)=>`<div class="wc"><div class="wct">${c.cat}</div>${c.items.map((it,si)=>{const k=ci+'-'+si,d=wiz[k];return`<div class="ws ${d?'dn':''}"><button class="wch ${d?'ok':''}" onclick="tW('${k}',this)">✓</button><div style="flex:1"><div style="font-size:12px;line-height:1.45">${it.t}</div><div style="color:var(--tx3);font-size:10px;margin-top:2px;font-family:var(--mono)">${it.d}</div><button class="cpb" style="margin-top:5px" onclick="cT(\`${it.c.replace(/`/g,"'")}\`)">Copier</button></div></div>`}).join('')}</div>`).join('')}
function tW(k,b){wiz[k]=!wiz[k];localStorage.setItem('kw3',JSON.stringify(wiz));b.classList.toggle('ok');b.closest('.ws').classList.toggle('dn')}

// ════════════════════════════════════════════════════════
// FIX-IT
// ════════════════════════════════════════════════════════
function rXP(){return`<div class="fg">${X.map(f=>`<div class="fc"><div class="fs">${f.s}</div><div class="ff">${f.f}</div>${f.ids.length?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:6px">${f.ids.map(id=>`<button class="cpb" onclick="jT('${id}')">→ ${id}</button>`).join('')}</div>`:''}</div>`).join('')}</div>`}

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}
function cT(t){navigator.clipboard.writeText(t).then(()=>toast('✓ Copié'))}
function tF(id){fav[id]=!fav[id];if(!fav[id])delete fav[id];localStorage.setItem('kf3',JSON.stringify(fav));render()}
function cR(id){const i=I.find(x=>x.id===id),f=F.find(x=>x.id===id);if(i)cT(`[${i.id}] ${i.name} (${i.vst})\n\nPRESET:\n${i.preset}\n\nTWEAKS:\n${i.tweaks}\n\nCHAIN:\n${i.chain}\n\nSTOP RULES:\n${i.stops.map(r=>'× '+r).join('\n')}`);else if(f)cT(`[${f.id}] ${f.name} (${f.role} · ${f.type})\n\nCHAIN:\n${f.ch.map((c,j)=>`${j+1}. ${c.p} — ${c.r}: ${c.s}`).join('\n')}\n\nSTOP RULES:\n${f.stops.map(r=>'× '+r).join('\n')}`)}
function jT(id){closeCmd();closeMob();if(I.find(x=>x.id===id)){pg='instr';iF={type:'',vst:'',genre:'',mood:''}}else if(F.find(x=>x.id===id)){pg='fx';fF={role:'',v:'',type:''}}render();setTimeout(()=>{const el=document.getElementById('c-'+id);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('open');el.style.boxShadow='0 0 0 2px var(--blue)';setTimeout(()=>el.style.boxShadow='',2500)}},80)}

// ════════════════════════════════════════════════════════
// COMMAND PALETTE
// ════════════════════════════════════════════════════════
let cS=0;
function aI(){return[...I.map(i=>({id:i.id,name:i.name,meta:`${i.vst} · ${i.type} · ${i.g.join('/')} · ${i.m.join('/')}`})),...F.map(f=>({id:f.id,name:f.name,meta:`${f.role} · ${f.v} · ${f.type}`}))]}
function openCmd(){document.getElementById('cmdBg').classList.add('open');const i=document.getElementById('cmdI');i.value='';i.focus();cS=0;rCmd('')}
function closeCmd(){document.getElementById('cmdBg').classList.remove('open')}
function rCmd(q){const c=document.getElementById('cmdL');let it=aI();if(q){const ql=q.toLowerCase();it=it.filter(i=>i.id.toLowerCase().includes(ql)||i.name.toLowerCase().includes(ql)||i.meta.toLowerCase().includes(ql))}if(!it.length){c.innerHTML='<div class="cmd-e">Aucun résultat</div>';return}it=it.slice(0,12);c.innerHTML=it.map((i,j)=>`<div class="cmd-r ${j===cS?'sel':''}" onclick="jT('${i.id}')"><div class="cmd-ic">${i.id}</div><div class="cmd-tx"><div class="cmd-nm">${i.name}</div><div class="cmd-mt">${i.meta}</div></div></div>`).join('')}
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openCmd();return}if(e.key==='/'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){e.preventDefault();openCmd();return}if(!document.getElementById('cmdBg').classList.contains('open'))return;if(e.key==='Escape'){closeCmd();return}const rs=document.querySelectorAll('.cmd-r');if(e.key==='ArrowDown'){e.preventDefault();cS=Math.min(cS+1,rs.length-1);rs.forEach((r,i)=>r.classList.toggle('sel',i===cS))}if(e.key==='ArrowUp'){e.preventDefault();cS=Math.max(cS-1,0);rs.forEach((r,i)=>r.classList.toggle('sel',i===cS))}if(e.key==='Enter'){e.preventDefault();rs[cS]?.click()}});
document.getElementById('cmdI').addEventListener('input',e=>{cS=0;rCmd(e.target.value)});
function openMob(){document.getElementById('side').classList.add('mo');document.getElementById('moo').classList.add('on')}
function closeMob(){document.getElementById('side').classList.remove('mo');document.getElementById('moo').classList.remove('on')}
render();
</script>
</body>
</html>
